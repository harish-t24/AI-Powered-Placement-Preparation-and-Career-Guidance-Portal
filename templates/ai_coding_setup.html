<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AI Coding Generator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="manifest"
href="/static/manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="{{ url_for('static', filename='css/responsive.css') }}">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
-45deg,
#0f172a,
#1e293b,
#2563eb,
#06b6d4
);

background-size:
400% 400%;

animation:
gradientBG 12s ease infinite;

overflow:hidden;

}

@keyframes gradientBG{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.generator-card{

width:100%;
max-width:800px;

background:
rgba(255,255,255,0.08);

backdrop-filter:
blur(20px);

border:
1px solid rgba(255,255,255,0.15);

border-radius:30px;

padding:40px;

box-shadow:
0 15px 40px rgba(0,0,0,0.3);

animation:
slideUp 1s ease;

color:white;

}

@keyframes slideUp{

from{

opacity:0;

transform:
translateY(50px);

}

to{

opacity:1;

transform:
translateY(0);

}

}

.top-icon{

font-size:85px;

text-align:center;

animation:
floatIcon 3s ease-in-out infinite;

}

@keyframes floatIcon{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-12px);
}

100%{
transform:translateY(0);
}

}

.title{

text-align:center;

font-size:2.8rem;

font-weight:700;

margin-top:10px;

}

.subtitle{

text-align:center;

color:#cbd5e1;

margin-bottom:35px;

}

.form-label{

font-weight:600;

margin-bottom:8px;

}

.form-select{

border:none;

border-radius:15px;

padding:14px;

background:
rgba(255,255,255,0.15);

color:white;

font-size:16px;

}

.form-select option{

background:#1e293b;

color:white;

}

.form-select:focus{

background:
rgba(255,255,255,0.2);

color:white;

box-shadow:
0 0 20px rgba(59,130,246,0.5);

}

.generate-btn{

width:100%;

padding:16px;

border:none;

border-radius:15px;

font-size:18px;

font-weight:600;

margin-top:15px;

background:
linear-gradient(
135deg,
#10b981,
#06b6d4
);

color:white;

transition:0.4s;

}

.generate-btn:hover{

transform:
translateY(-5px);

box-shadow:
0 12px 30px rgba(16,185,129,0.5);

}

.feature-row{

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:15px;

margin-top:30px;

}

.feature{

background:
rgba(255,255,255,0.08);

padding:12px 18px;

border-radius:20px;

font-size:14px;

transition:0.3s;

}

.feature:hover{

transform:
translateY(-3px);

background:
rgba(255,255,255,0.15);

}

.stats{

margin-top:25px;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(150px,1fr));

gap:15px;

}

.stat-box{

background:
rgba(255,255,255,0.08);

padding:15px;

border-radius:15px;

text-align:center;

}

.stat-icon{

font-size:28px;

margin-bottom:8px;

}

.pulse{

animation:
pulse 2s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.02);
}

100%{
transform:scale(1);
}

}

</style>

</head>

<body>

<div class="generator-card pulse">
{% include 'navbar.html' %}
<div class="top-icon">

💻

</div>

<h1 class="title">

AI Coding Generator

</h1>

<p class="subtitle">

Generate company-specific coding questions powered by AI

</p>

<form method="POST">

<div class="mb-3">

<label class="form-label">

💻 Programming Language

</label>

<select
name="language"
class="form-select">

<option>Python</option>
<option>Java</option>
<option>C++</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">

🎯 Difficulty Level

</label>

<select
name="difficulty"
class="form-select">

<option>Easy</option>
<option>Medium</option>
<option>Hard</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">

🏢 Target Company

</label>

<select
name="company"
class="form-select">

<option>TCS</option>
<option>Infosys</option>
<option>Wipro</option>
<option>Accenture</option>
<option>Cognizant</option>
<option>Zoho</option>
<option>Amazon</option>
<option>Google</option>

</select>

</div>

<button
class="generate-btn">

🚀 Generate Coding Questions

</button>

</form>

<div class="feature-row">

<div class="feature">
🤖 AI Powered
</div>

<div class="feature">
🏢 Company Specific
</div>

<div class="feature">
🎯 Interview Ready
</div>

<div class="feature">
⚡ Real Coding Problems
</div>

</div>

<div class="stats">

<div class="stat-box">

<div class="stat-icon">
🐍
</div>

Python

</div>

<div class="stat-box">

<div class="stat-icon">
☕
</div>

Java

</div>

<div class="stat-box">

<div class="stat-icon">
⚙️
</div>

C++

</div>

<div class="stat-box">

<div class="stat-icon">
🏆
</div>

Placement Ready

</div>

</div>

</div>

<script>

if(
'serviceWorker'
in navigator
){

navigator.serviceWorker.register(
'/static/sw.js'
);

}

</script>

</body>

</html>
