<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Activity Timeline</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="manifest"
href="/static/manifest.json">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    background:
    linear-gradient(
    135deg,
    #0f172a,
    #1e293b,
    #0f172a
    );

    background-size:400% 400%;

    animation:
    gradientMove 10s ease infinite;

    color:white;

    overflow-x:hidden;

}

@keyframes gradientMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.timeline-title{

    font-size:3rem;

    font-weight:700;

    text-align:center;

    margin-bottom:10px;

    animation:
    fadeDown 1s ease;

}

.subtitle{

    text-align:center;

    color:#cbd5e1;

    margin-bottom:40px;

}

.timeline{

    position:relative;

    max-width:900px;

    margin:auto;

}

.timeline::after{

    content:'';

    position:absolute;

    width:4px;

    background:#38bdf8;

    top:0;

    bottom:0;

    left:50%;

    margin-left:-2px;

}

.timeline-card{

    position:relative;

    width:50%;

    padding:10px 40px;

    animation:
    fadeUp 0.8s ease forwards;

}

.timeline-card.left{

    left:0;

}

.timeline-card.right{

    left:50%;

}

.timeline-content{

    background:
    rgba(255,255,255,0.08);

    backdrop-filter:
    blur(15px);

    border:
    1px solid rgba(255,255,255,0.15);

    border-radius:20px;

    padding:20px;

    transition:0.4s;

    box-shadow:
    0 8px 25px rgba(0,0,0,0.25);

}

.timeline-content:hover{

    transform:
    translateY(-8px)
    scale(1.03);

    box-shadow:
    0 12px 35px rgba(56,189,248,0.4);

}

.timeline-card::after{

    content:'';

    position:absolute;

    width:22px;

    height:22px;

    background:#38bdf8;

    border-radius:50%;

    top:25px;

    z-index:2;

}

.left::after{

    right:-11px;

}

.right::after{

    left:-11px;

}

.activity-icon{

    font-size:2rem;

    margin-bottom:10px;

}

.activity-title{

    font-size:1.2rem;

    font-weight:600;

}

.activity-date{

    color:#94a3b8;

    font-size:0.9rem;

}

.dashboard-btn{

    display:block;

    width:250px;

    margin:40px auto;

    border:none;

    border-radius:50px;

    padding:15px;

    font-size:18px;

    font-weight:600;

    background:
    linear-gradient(
    135deg,
    #06b6d4,
    #3b82f6
    );

    color:white;

    transition:0.4s;

}

.dashboard-btn:hover{

    transform:
    translateY(-5px);

    box-shadow:
    0 10px 25px rgba(59,130,246,0.5);

}

@keyframes fadeUp{

from{

opacity:0;

transform:
translateY(30px);

}

to{

opacity:1;

transform:
translateY(0);

}

}

@keyframes fadeDown{

from{

opacity:0;

transform:
translateY(-30px);

}

to{

opacity:1;

transform:
translateY(0);

}

}

@media(max-width:768px){

.timeline::after{

left:20px;

}

.timeline-card{

width:100%;

padding-left:60px;

padding-right:20px;

}

.timeline-card.right{

left:0;

}

.timeline-card.left{

left:0;

}

.left::after,
.right::after{

left:9px;

}

}

</style>

</head>

<body>

<div class="container py-5">
{% include 'navbar.html' %}

<h1 class="timeline-title">

📅 Activity Timeline

</h1>

<p class="subtitle">

Track your complete placement preparation journey

</p>

<div class="timeline">

{% for activity in activities %}

<div class="timeline-card {% if loop.index % 2 == 0 %}right{% else %}left{% endif %}">

<div class="timeline-content">

<div class="activity-icon">
🚀
</div>

<div class="activity-title">

{{ activity.activity }}

</div>

<div class="activity-date">

{{ activity.created_at }}

</div>

</div>

</div>

{% endfor %}

</div>

<a href="/dashboard"
class="btn dashboard-btn">

🏠 Back to Dashboard

</a>

</div>

<script>

if('serviceWorker' in navigator){

navigator.serviceWorker.register(
'/static/sw.js'
);

}

</script>

</body>
</html>
