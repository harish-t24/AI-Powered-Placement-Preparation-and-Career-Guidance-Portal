<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AI Mock Interview</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="manifest"
href="/static/manifest.json">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#2563eb,
#06b6d4
);

background-size:400% 400%;

animation:
gradientBG 12s ease infinite;

color:white;

overflow-x:hidden;

}

@keyframes gradientBG{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.interview-container{

max-width:1000px;

margin:auto;

padding:40px 20px;

}

.glass-card{

background:
rgba(255,255,255,0.08);

backdrop-filter:
blur(20px);

border:
1px solid rgba(255,255,255,0.1);

border-radius:30px;

padding:40px;

box-shadow:
0 20px 40px rgba(0,0,0,0.25);

animation:
fadeUp 1s ease;

}

@keyframes fadeUp{

from{

opacity:0;

transform:
translateY(40px);

}

to{

opacity:1;

transform:
translateY(0);

}

}

.title{

text-align:center;

font-size:3rem;

font-weight:700;

margin-bottom:20px;

}

.subtitle{

text-align:center;

color:#cbd5e1;

margin-bottom:30px;

}

.avatar-container{

text-align:center;

margin-bottom:25px;

}

.avatar{

width:220px;

animation:
talk 2s infinite;

filter:
drop-shadow(0 0 20px rgba(59,130,246,0.5));

}

@keyframes talk{

0%{
transform:scale(1);
}

50%{
transform:scale(1.06);
}

100%{
transform:scale(1);
}

}

.question-card{

background:
rgba(255,255,255,0.08);

padding:25px;

border-radius:20px;

margin-bottom:25px;

border-left:
5px solid #38bdf8;

}

.question-title{

font-size:1.3rem;

font-weight:600;

}

.answer-box{

background:
rgba(255,255,255,0.08);

border:none;

border-radius:20px;

color:white;

padding:20px;

}

.answer-box:focus{

background:
rgba(255,255,255,0.12);

color:white;

box-shadow:
0 0 20px rgba(59,130,246,0.4);

}

.action-buttons{

display:flex;

justify-content:center;

gap:15px;

margin-top:25px;

flex-wrap:wrap;

}

.btn-custom{

padding:14px 28px;

border:none;

border-radius:50px;

font-weight:600;

font-size:16px;

transition:0.3s;

}

.btn-submit{

background:
linear-gradient(
135deg,
#10b981,
#06b6d4
);

color:white;

}

.btn-voice{

background:
linear-gradient(
135deg,
#f59e0b,
#ef4444
);

color:white;

}

.btn-read{

background:
linear-gradient(
135deg,
#2563eb,
#3b82f6
);

color:white;

}

.btn-custom:hover{

transform:
translateY(-4px);

}

.status-box{

display:flex;

justify-content:center;

gap:15px;

margin-top:20px;

flex-wrap:wrap;

}

.status{

background:
rgba(255,255,255,0.08);

padding:10px 20px;

border-radius:20px;

}

</style>

</head>

<body>

<div class="interview-container">
{% include 'navbar.html' %}
<div class="glass-card">

<h1 class="title">

🎤 AI Mock Interview

</h1>

<p class="subtitle">

Practice real interview questions with your AI Interviewer

</p>

<div class="avatar-container">

<img
src="{{ url_for('static', filename='avatar.png') }}"
class="avatar">

</div>

<div class="status-box">

<div class="status">

🤖 AI Interviewer

</div>

<div class="status">

💼 Placement Training

</div>

<div class="status">

🎯 Real Interview Experience

</div>

</div>

<div class="question-card">

<div class="question-title">

❓ Interview Question

</div>

<hr>

<h4>

{{ question }}

</h4>

</div>

<form method="POST">

<textarea
name="answer"
class="form-control answer-box"
rows="8"
placeholder="Type your answer here..."
required></textarea>

<div class="action-buttons">

<button
type="button"
class="btn-custom btn-read"
onclick="readQuestion()">

🔊 Read Question

</button>

<button
type="button"
class="btn-custom btn-voice"
onclick="startListening()">

🎙 Voice Answer

</button>

<button
type="submit"
class="btn-custom btn-submit">

🚀 Submit Answer

</button>

</div>

</form>

</div>

</div>

<script>

function readQuestion(){

let text = `{{ question }}`;

let speech =
new SpeechSynthesisUtterance(text);

speech.lang = "en-US";

window.speechSynthesis.speak(speech);

}

function startListening(){

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SpeechRecognition){

alert("Speech Recognition Not Supported");

return;

}

const recognition =
new SpeechRecognition();

recognition.lang =
"en-US";

recognition.start();

recognition.onresult =
function(event){

document.querySelector(
'textarea[name="answer"]'
).value +=
event.results[0][0].transcript;

};

}

</script>

</body>

</html>
