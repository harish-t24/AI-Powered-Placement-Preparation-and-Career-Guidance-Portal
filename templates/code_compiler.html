<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AI Python Compiler</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="manifest"
href="/static/manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(
-45deg,
#0f172a,
#1e293b,
#2563eb,
#06b6d4
);

background-size:
400% 400%;

animation:
gradientMove 12s ease infinite;

min-height:100vh;

padding:30px;

color:white;

}

@keyframes gradientMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.main-card{

max-width:1200px;

margin:auto;

background:
rgba(255,255,255,0.08);

backdrop-filter:
blur(20px);

border:
1px solid rgba(255,255,255,0.15);

border-radius:30px;

padding:35px;

box-shadow:
0 15px 40px rgba(0,0,0,0.3);

animation:
fadeIn 1s ease;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.compiler-icon{

font-size:100px;

text-align:center;

animation:
floatIcon 3s ease-in-out infinite;

}

@keyframes floatIcon{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-12px);
}

100%{
transform:translateY(0);
}

}

.title{

font-size:3rem;

font-weight:700;

text-align:center;

}

.subtitle{

text-align:center;

color:#cbd5e1;

margin-bottom:25px;

}

.editor-box{

background:#0d1117;

border:none;

border-radius:20px;

padding:20px;

font-family:
Consolas,
monospace;

font-size:16px;

color:#22c55e;

min-height:350px;

resize:none;

}

.editor-box:focus{

box-shadow:
0 0 20px rgba(59,130,246,0.5);

background:#0d1117;

color:#22c55e;

}

.run-btn{

width:100%;

padding:16px;

border:none;

border-radius:15px;

font-size:18px;

font-weight:600;

margin-top:15px;

background:
linear-gradient(
135deg,
#10b981,
#06b6d4
);

color:white;

transition:0.4s;

}

.run-btn:hover{

transform:
translateY(-5px);

box-shadow:
0 10px 25px rgba(16,185,129,0.5);

}

.output-card{

margin-top:25px;

background:
rgba(255,255,255,0.08);

border-radius:25px;

padding:25px;

animation:
slideUp 0.8s ease;

}

.terminal{

background:#000;

color:#22c55e;

padding:20px;

border-radius:15px;

font-family:
Consolas,
monospace;

overflow:auto;

}

.review-card{

margin-top:20px;

background:
rgba(255,255,255,0.08);

padding:20px;

border-radius:20px;

}

.review-content{

background:
rgba(255,255,255,0.05);

padding:20px;

border-radius:15px;

max-height:400px;

overflow:auto;

}

.review-content pre{

white-space:pre-wrap;

word-wrap:break-word;

color:white;

}

.stats{

display:flex;

justify-content:center;

gap:15px;

flex-wrap:wrap;

margin-bottom:25px;

}

.stat{

background:
rgba(255,255,255,0.08);

padding:12px 18px;

border-radius:20px;

}

</style>

</head>

<body>

<div class="main-card">
{% include 'navbar.html' %}
<div class="compiler-icon">

💻

</div>

<h1 class="title">

AI Python Compiler

</h1>

<p class="subtitle">

Write, execute and review Python code with AI

</p>

<div class="stats">

<div class="stat">
🐍 Python
</div>

<div class="stat">
⚡ Instant Execution
</div>

<div class="stat">
🤖 AI Review
</div>

<div class="stat">
🚀 Placement Ready
</div>

</div>

<form method="POST">

<textarea

name="code"

class="form-control editor-box"

rows="15">print("Hello World")</textarea>

<button
class="run-btn">

▶ Run Code

</button>

</form>

{% if output %}

<div class="output-card">

<h3>

🖥 Output Terminal

</h3>

<hr>

<div class="terminal">

<pre>{{ output }}</pre>

</div>

{% if review %}

<div class="review-card">

<h3>

🤖 AI Code Review

</h3>

<hr>

<div class="review-content">

<pre>{{ review }}</pre>

</div>

</div>

{% endif %}

</div>

{% endif %}

</div>

<script>

if(
'serviceWorker'
in navigator
){

navigator.serviceWorker.register(
'/static/sw.js'
);

}

</script>

</body>

</html>
