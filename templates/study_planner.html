<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AI Study Planner</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="manifest"
href="/static/manifest.json">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="{{ url_for('static', filename='css/responsive.css') }}">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#2563eb,
#06b6d4
);

background-size:400% 400%;

animation:
gradientBG 12s ease infinite;

color:white;

padding:30px;

}

@keyframes gradientBG{

0%{background-position:0% 50%;}

50%{background-position:100% 50%;}

100%{background-position:0% 50%;}

}

.planner-card{

max-width:1100px;

margin:auto;

background:
rgba(255,255,255,0.08);

backdrop-filter:
blur(20px);

border:
1px solid rgba(255,255,255,0.1);

border-radius:30px;

padding:40px;

box-shadow:
0 20px 40px rgba(0,0,0,0.3);

animation:
fadeUp 1s ease;

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.planner-icon{

font-size:90px;

text-align:center;

margin-bottom:20px;

animation:
floatIcon 3s infinite ease-in-out;

}

@keyframes floatIcon{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}

100%{
transform:translateY(0);
}

}

.title{

font-size:3rem;

font-weight:700;

text-align:center;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#cbd5e1;

margin-bottom:30px;

}

.form-control,
.form-select{

background:
rgba(255,255,255,0.08);

border:none;

color:white;

padding:15px;

border-radius:15px;

}

.form-select option{

color:black;

}

.form-control:focus,
.form-select:focus{

background:
rgba(255,255,255,0.12);

color:white;

box-shadow:
0 0 20px rgba(59,130,246,0.3);

}

.plan-btn{

width:100%;

padding:15px;

border:none;

border-radius:15px;

font-size:18px;

font-weight:600;

background:
linear-gradient(
135deg,
#10b981,
#06b6d4
);

color:white;

transition:0.3s;

}

.plan-btn:hover{

transform:
translateY(-4px);

}

.role-card{

background:
rgba(255,255,255,0.08);

padding:15px;

border-radius:15px;

text-align:center;

margin-bottom:15px;

transition:0.3s;

}

.role-card:hover{

transform:
translateY(-5px);

background:
rgba(255,255,255,0.12);

}

.plan-box{

background:
rgba(255,255,255,0.08);

border-radius:20px;

padding:25px;

margin-top:30px;

}

.plan-box pre{

color:white;

white-space:pre-wrap;

font-size:15px;

}

.action-btn{

padding:12px 25px;

border-radius:50px;

font-weight:600;

margin:5px;

}

</style>

</head>

<body>

<div class="planner-card">

<div class="planner-icon">

📚

</div>

<h1 class="title">

AI Study Planner

</h1>

<p class="subtitle">

Generate a personalized placement preparation roadmap using AI

</p>

<div class="row">

<div class="col-lg-7">

<form method="POST">

<div class="mb-3">

<label class="mb-2">

📅 Days Available

</label>

<input
type="number"
name="days"
class="form-control"
placeholder="Enter available days"
required>

</div>

<div class="mb-3">

<label class="mb-2">

🎯 Target Role

</label>

<select
name="role"
class="form-select">

<option>Python Developer</option>
<option>Full Stack Developer</option>
<option>Data Scientist</option>
<option>AI Engineer</option>
<option>Software Engineer</option>

</select>

</div>

<button
class="plan-btn">

🚀 Generate Study Plan

</button>

</form>

</div>

<div class="col-lg-5">

<div class="role-card">

🐍 Python Developer

</div>

<div class="role-card">

🌐 Full Stack Developer

</div>

<div class="role-card">

📊 Data Scientist

</div>

<div class="role-card">

🤖 AI Engineer

</div>

<div class="role-card">

💻 Software Engineer

</div>

</div>

</div>

{% if plan %}

<div class="plan-box">

<h3>

📋 Generated Study Plan

</h3>

<hr>

<pre>{{ plan }}</pre>

</div>

{% endif %}

<div class="text-center mt-4">

<a href="javascript:history.back()"
class="btn btn-secondary action-btn">

⬅ Back

</a>

<a href="/dashboard"
class="btn btn-success action-btn">

🏠 Dashboard

</a>

</div>

</div>

<script>

if(
'serviceWorker'
in navigator
){

navigator.serviceWorker.register(
'/static/sw.js'
);

}

</script>

</body>

</html>
