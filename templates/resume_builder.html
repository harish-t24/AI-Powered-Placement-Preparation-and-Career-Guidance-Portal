<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AI Resume Builder</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="manifest"
href="/static/manifest.json">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="{{ url_for('static', filename='css/responsive.css') }}">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#2563eb,
#06b6d4
);

background-size:400% 400%;

animation:
gradientBG 12s ease infinite;

color:white;

padding:30px;

}

@keyframes gradientBG{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.resume-card{

max-width:1100px;

margin:auto;

background:
rgba(255,255,255,0.08);

backdrop-filter:
blur(20px);

border:
1px solid rgba(255,255,255,0.1);

border-radius:30px;

padding:40px;

box-shadow:
0 20px 40px rgba(0,0,0,0.3);

animation:
fadeUp 1s ease;

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.page-title{

font-size:3rem;

font-weight:700;

text-align:center;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#cbd5e1;

margin-bottom:35px;

}

.resume-icon{

font-size:80px;

text-align:center;

animation:
floatIcon 3s infinite ease-in-out;

margin-bottom:20px;

}

@keyframes floatIcon{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}

100%{
transform:translateY(0);
}

}

.form-control{

background:
rgba(255,255,255,0.08);

border:none;

color:white;

padding:15px;

border-radius:15px;

}

.form-control::placeholder{

color:#cbd5e1;

}

.form-control:focus{

background:
rgba(255,255,255,0.12);

color:white;

box-shadow:
0 0 20px rgba(59,130,246,0.3);

}

.section-title{

font-weight:600;

margin-bottom:10px;

}

.generate-btn{

width:100%;

padding:15px;

border:none;

border-radius:15px;

font-size:18px;

font-weight:600;

background:
linear-gradient(
135deg,
#10b981,
#06b6d4
);

color:white;

transition:0.3s;

}

.generate-btn:hover{

transform:
translateY(-4px);

}

.preview-box{

background:
rgba(255,255,255,0.08);

border-radius:20px;

padding:20px;

height:100%;

}

.preview-box h5{

margin-bottom:15px;

}

.preview-item{

background:
rgba(255,255,255,0.08);

padding:10px;

border-radius:10px;

margin-bottom:10px;

}

.action-btn{

padding:12px 25px;

border-radius:50px;

font-weight:600;

margin:5px;

}

</style>

</head>

<body>

<div class="resume-card">

<div class="resume-icon">

📄

</div>

<h1 class="page-title">

AI Resume Builder

</h1>

<p class="subtitle">

Generate professional ATS-friendly resumes instantly using AI

</p>

<div class="row">

<div class="col-lg-7">

<form method="POST">

<div class="mb-3">

<label class="section-title">

👤 Full Name

</label>

<input
name="name"
class="form-control"
placeholder="Enter Full Name"
required>

</div>

<div class="mb-3">

<label class="section-title">

💼 Target Role

</label>

<input
name="role"
class="form-control"
placeholder="Python Developer, Data Analyst..."
required>

</div>

<div class="mb-3">

<label class="section-title">

🛠 Skills

</label>

<textarea
name="skills"
class="form-control"
rows="4"
placeholder="Python, Flask, SQL, HTML, CSS..."
required></textarea>

</div>

<div class="mb-3">

<label class="section-title">

🚀 Projects

</label>

<textarea
name="projects"
class="form-control"
rows="4"
placeholder="Placement Portal, AI Chatbot..."
required></textarea>

</div>

<div class="mb-3">

<label class="section-title">

🎓 Education

</label>

<textarea
name="education"
class="form-control"
rows="4"
placeholder="B.Tech CSE - Rajiv Gandhi College..."
required></textarea>

</div>

<button
class="generate-btn">

✨ Generate Resume PDF

</button>

</form>

</div>

<div class="col-lg-5">

<div class="preview-box">

<h5>

📋 Resume Preview Sections

</h5>

<div class="preview-item">

👤 Personal Information

</div>

<div class="preview-item">

🎯 Career Objective

</div>

<div class="preview-item">

🛠 Technical Skills

</div>

<div class="preview-item">

🚀 Projects

</div>

<div class="preview-item">

🎓 Education

</div>

<div class="preview-item">

🏆 Achievements

</div>

<div class="preview-item">

📄 ATS Optimized Format

</div>

</div>

</div>

</div>

<div class="text-center mt-4">

<a href="javascript:history.back()"
class="btn btn-secondary action-btn">

⬅ Back

</a>

<a href="/dashboard"
class="btn btn-success action-btn">

🏠 Dashboard

</a>

</div>

</div>

<script>

if(
'serviceWorker'
in navigator
){

navigator.serviceWorker.register(
'/static/sw.js'
);

}

</script>

</body>

</html>
