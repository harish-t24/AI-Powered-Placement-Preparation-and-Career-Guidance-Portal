<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Offline</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="{{ url_for('static', filename='css/responsive.css') }}">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;
align-items:center;

background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#2563eb,
#06b6d4
);

background-size:400% 400%;

animation:
gradientBG 12s ease infinite;

overflow:hidden;

color:white;

}

@keyframes gradientBG{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.offline-card{

width:90%;
max-width:700px;

background:
rgba(255,255,255,0.08);

backdrop-filter:
blur(20px);

border:
1px solid rgba(255,255,255,0.1);

border-radius:30px;

padding:50px;

text-align:center;

box-shadow:
0 20px 40px rgba(0,0,0,0.3);

animation:
fadeUp 1s ease;

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.offline-icon{

font-size:120px;

margin-bottom:20px;

animation:
floatIcon 3s infinite ease-in-out;

}

@keyframes floatIcon{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-12px);
}

100%{
transform:translateY(0);
}

}

.title{

font-size:3rem;

font-weight:700;

margin-bottom:15px;

}

.subtitle{

font-size:18px;

color:#cbd5e1;

margin-bottom:25px;

}

.status{

background:
rgba(255,255,255,0.08);

padding:15px;

border-radius:20px;

margin-top:20px;

display:inline-block;

}

.retry-btn{

margin-top:30px;

padding:14px 35px;

border:none;

border-radius:50px;

font-size:18px;

font-weight:600;

background:
linear-gradient(
135deg,
#10b981,
#06b6d4
);

color:white;

transition:0.3s;

}

.retry-btn:hover{

transform:
translateY(-4px);

}

</style>

</head>

<body>

<div class="offline-card">
{% include 'navbar.html' %}
<div class="offline-icon">

📴

</div>

<h1 class="title">

You Are Offline

</h1>

<p class="subtitle">

Your internet connection appears to be unavailable.

Please reconnect to continue using the AI Placement Portal.

</p>

<div class="status">

🌐 Network Status: Offline

</div>

<br>

<button
class="retry-btn"
onclick="window.location.reload()">

🔄 Retry Connection

</button>

</div>

</body>

</html>
