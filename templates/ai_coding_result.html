<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AI Coding Questions</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="manifest"
href="/static/manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link
rel="stylesheet"
href="{{ url_for('static', filename='css/responsive.css') }}">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(
-45deg,
#0f172a,
#1e293b,
#2563eb,
#06b6d4
);

background-size:
400% 400%;

animation:
gradientMove 12s ease infinite;

min-height:100vh;

color:white;

}

@keyframes gradientMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.main-container{

max-width:1200px;

margin:auto;

padding:30px;

}

.hero-card{

background:
rgba(255,255,255,0.08);

backdrop-filter:
blur(20px);

border:
1px solid rgba(255,255,255,0.15);

border-radius:30px;

padding:35px;

text-align:center;

margin-bottom:25px;

animation:
fadeDown 1s ease;

}

.hero-icon{

font-size:75px;

animation:
floatIcon 3s ease-in-out infinite;

}

@keyframes floatIcon{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-12px);
}

100%{
transform:translateY(0);
}

}

.hero-title{

font-size:3rem;

font-weight:700;

margin-top:10px;

}

.hero-subtitle{

color:#cbd5e1;

margin-top:10px;

}

.question-card{

background:
rgba(255,255,255,0.08);

backdrop-filter:
blur(15px);

border:
1px solid rgba(255,255,255,0.12);

border-radius:25px;

padding:30px;

animation:
fadeUp 1s ease;

}

.question-header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:20px;

flex-wrap:wrap;

gap:10px;

}

.ai-badge{

background:
linear-gradient(
135deg,
#10b981,
#06b6d4
);

padding:10px 18px;

border-radius:30px;

font-weight:600;

}

.question-content{

background:
rgba(255,255,255,0.05);

border-radius:20px;

padding:25px;

max-height:650px;

overflow-y:auto;

line-height:1.8;

}

.question-content h1,
.question-content h2,
.question-content h3{

color:#38bdf8;

margin-top:15px;

}

.question-content p{

color:white;

}

.question-content code{

background:
rgba(0,0,0,0.25);

padding:4px 8px;

border-radius:8px;

color:#22c55e;

}

.question-content pre{

background:
rgba(0,0,0,0.25);

padding:15px;

border-radius:15px;

overflow-x:auto;

color:#22c55e;

}

.stats-row{

margin-top:25px;

}

.stat-box{

background:
rgba(255,255,255,0.08);

backdrop-filter:
blur(15px);

padding:20px;

border-radius:20px;

text-align:center;

transition:0.4s;

}

.stat-box:hover{

transform:
translateY(-5px);

box-shadow:
0 10px 25px rgba(59,130,246,0.3);

}

.stat-icon{

font-size:32px;

margin-bottom:10px;

}

.action-buttons{

margin-top:30px;

display:flex;

justify-content:center;

gap:15px;

flex-wrap:wrap;

}

.btn-custom{

padding:14px 28px;

border:none;

border-radius:50px;

font-weight:600;

transition:0.4s;

text-decoration:none;

color:white;

}

.dashboard-btn{

background:
linear-gradient(
135deg,
#2563eb,
#3b82f6
);

}

.generate-btn{

background:
linear-gradient(
135deg,
#10b981,
#22c55e
);

}

.compiler-btn{

background:
linear-gradient(
135deg,
#f59e0b,
#ef4444
);

}

.btn-custom:hover{

transform:
translateY(-5px);

box-shadow:
0 10px 25px rgba(255,255,255,0.2);

color:white;

}

@keyframes fadeDown{

from{

opacity:0;

transform:
translateY(-30px);

}

to{

opacity:1;

transform:
translateY(0);

}

}

@keyframes fadeUp{

from{

opacity:0;

transform:
translateY(30px);

}

to{

opacity:1;

transform:
translateY(0);

}

}

::-webkit-scrollbar{

width:8px;

}

::-webkit-scrollbar-thumb{

background:#3b82f6;

border-radius:10px;

}

</style>

</head>

<body>
{% include 'navbar.html' %}
<div class="main-container">

<div class="hero-card">

<div class="hero-icon">
💻
</div>

<h1 class="hero-title">

AI Coding Questions

</h1>

<p class="hero-subtitle">

Practice company-specific coding problems generated by AI

</p>

</div>

<div class="question-card">

<div class="question-header">

<h3>

🚀 Coding Challenge Bank

</h3>

<div class="ai-badge">

🤖 AI Generated

</div>

</div>

<div class="question-content">

{{ questions | safe }}

</div>

</div>

<div class="row stats-row g-3">

<div class="col-md-4">

<div class="stat-box">

<div class="stat-icon">
⚡
</div>

<h5>

AI Generated

</h5>

</div>

</div>

<div class="col-md-4">

<div class="stat-box">

<div class="stat-icon">
🎯
</div>

<h5>

Interview Ready

</h5>

</div>

</div>

<div class="col-md-4">

<div class="stat-box">

<div class="stat-icon">
🏆
</div>

<h5>

Placement Focused

</h5>

</div>

</div>

</div>

<div class="action-buttons">

<a href="/dashboard"
class="btn-custom dashboard-btn">

🏠 Dashboard

</a>

<a href="/ai-coding"
class="btn-custom generate-btn">

🔄 Generate Again

</a>

<a href="/code-compiler"
class="btn-custom compiler-btn">

💻 Open Compiler

</a>

</div>

</div>

<script>

if(
'serviceWorker'
in navigator
){

navigator.serviceWorker
.register(
'/static/sw.js'
);

}

</script>

</body>

</html>
