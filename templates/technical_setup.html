<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AI Technical Interview</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="manifest"
href="/static/manifest.json">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#2563eb,
#06b6d4
);

background-size:400% 400%;

animation:
gradientBG 12s ease infinite;

color:white;

padding:30px;

}

@keyframes gradientBG{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.interview-card{

max-width:1000px;

margin:auto;

background:
rgba(255,255,255,0.08);

backdrop-filter:
blur(20px);

border:
1px solid rgba(255,255,255,0.1);

border-radius:30px;

padding:40px;

box-shadow:
0 20px 40px rgba(0,0,0,0.3);

animation:
fadeUp 1s ease;

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.robot{

font-size:100px;

text-align:center;

margin-bottom:20px;

animation:
floatRobot 3s infinite ease-in-out;

}

@keyframes floatRobot{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-12px);
}

100%{
transform:translateY(0);
}

}

.title{

font-size:3rem;

font-weight:700;

text-align:center;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#cbd5e1;

margin-bottom:30px;

}

.form-select{

background:
rgba(255,255,255,0.08);

border:none;

color:white;

padding:15px;

border-radius:15px;

}

.form-select option{

color:black;

}

.form-select:focus{

background:
rgba(255,255,255,0.12);

color:white;

box-shadow:
0 0 20px rgba(59,130,246,0.4);

}

.subject-card{

background:
rgba(255,255,255,0.08);

padding:15px;

border-radius:15px;

text-align:center;

margin-bottom:15px;

transition:0.3s;

}

.subject-card:hover{

transform:
translateY(-5px);

background:
rgba(255,255,255,0.12);

}

.generate-btn{

width:100%;

padding:15px;

border:none;

border-radius:15px;

font-size:18px;

font-weight:600;

background:
linear-gradient(
135deg,
#10b981,
#06b6d4
);

color:white;

transition:0.3s;

}

.generate-btn:hover{

transform:
translateY(-4px);

}

.action-btn{

padding:12px 25px;

border-radius:50px;

font-weight:600;

margin:5px;

}

</style>

</head>

<body>

<div class="interview-card">

<div class="robot">

🤖

</div>

<h1 class="title">

AI Technical Interview

</h1>

<p class="subtitle">

Generate real technical interview questions and improve your placement readiness

</p>

<div class="row">

<div class="col-lg-7">

<form method="POST">

<label class="mb-3">

📚 Select Subject

</label>

<select
name="subject"
class="form-select">

<option>Python</option>
<option>Java</option>
<option>DBMS</option>
<option>Operating Systems</option>
<option>Computer Networks</option>
<option>Data Structures</option>
<option>SQL</option>
<option>OOP</option>

</select>

<br>

<button
name="generate"
class="generate-btn">

🚀 Generate Interview Question

</button>

</form>

</div>

<div class="col-lg-5">

<div class="subject-card">

🐍 Python

</div>

<div class="subject-card">

☕ Java

</div>

<div class="subject-card">

🗄 DBMS

</div>

<div class="subject-card">

💻 Operating Systems

</div>

<div class="subject-card">

🌐 Computer Networks

</div>

<div class="subject-card">

📊 Data Structures

</div>

<div class="subject-card">

🧮 SQL

</div>

<div class="subject-card">

🎯 OOP

</div>

</div>

</div>

<div class="text-center mt-4">

<a href="javascript:history.back()"
class="btn btn-secondary action-btn">

⬅ Back

</a>

<a href="/dashboard"
class="btn btn-success action-btn">

🏠 Dashboard

</a>

</div>

</div>

<script>

if(
'serviceWorker'
in navigator
){

navigator.serviceWorker.register(
'/static/sw.js'
);

}

</script>

</body>

</html>
