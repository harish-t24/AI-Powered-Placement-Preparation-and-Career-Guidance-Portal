<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AI Career Coach</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="manifest"
href="/static/manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="{{ url_for('static', filename='css/responsive.css') }}">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(
-45deg,
#0f172a,
#1e293b,
#2563eb,
#06b6d4
);

background-size:
400% 400%;

animation:
gradientMove 12s ease infinite;

min-height:100vh;

padding:30px;

color:white;

}

@keyframes gradientMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.main-card{

max-width:1000px;

margin:auto;

background:
rgba(255,255,255,0.08);

backdrop-filter:
blur(20px);

border:
1px solid rgba(255,255,255,0.15);

border-radius:30px;

padding:35px;

box-shadow:
0 15px 40px rgba(0,0,0,0.3);

animation:
fadeIn 1s ease;

}

@keyframes fadeIn{

from{

opacity:0;

transform:
translateY(40px);

}

to{

opacity:1;

transform:
translateY(0);

}

}

.avatar{

font-size:110px;

text-align:center;

animation:
floatAvatar 3s ease-in-out infinite;

}

@keyframes floatAvatar{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-12px);
}

100%{
transform:translateY(0);
}

}

.title{

font-size:3rem;

font-weight:700;

text-align:center;

}

.subtitle{

text-align:center;

color:#cbd5e1;

margin-bottom:25px;

}

.question-box{

background:
rgba(255,255,255,0.08);

border:none;

border-radius:20px;

padding:18px;

color:white;

}

.question-box:focus{

background:
rgba(255,255,255,0.12);

color:white;

box-shadow:
0 0 20px rgba(59,130,246,0.5);

}

.question-box::placeholder{

color:#cbd5e1;

}

.ask-btn{

width:100%;

padding:15px;

border:none;

border-radius:15px;

font-size:18px;

font-weight:600;

margin-top:15px;

background:
linear-gradient(
135deg,
#2563eb,
#06b6d4
);

color:white;

transition:0.4s;

}

.ask-btn:hover{

transform:
translateY(-5px);

box-shadow:
0 10px 25px rgba(59,130,246,0.5);

}

.response-card{

margin-top:30px;

background:
rgba(255,255,255,0.08);

backdrop-filter:
blur(15px);

border-radius:25px;

padding:25px;

animation:
slideUp 0.8s ease;

}

@keyframes slideUp{

from{

opacity:0;

transform:
translateY(30px);

}

to{

opacity:1;

transform:
translateY(0);

}

}

.response-header{

display:flex;

align-items:center;

gap:15px;

margin-bottom:15px;

}

.ai-icon{

font-size:45px;

}

.response-title{

font-size:1.5rem;

font-weight:600;

}

.response-content{

background:
rgba(255,255,255,0.05);

padding:20px;

border-radius:15px;

max-height:500px;

overflow-y:auto;

}

.response-content pre{

white-space:pre-wrap;

word-wrap:break-word;

color:white;

margin:0;

}

.feature-row{

display:flex;

justify-content:center;

gap:15px;

flex-wrap:wrap;

margin-top:25px;

}

.feature{

background:
rgba(255,255,255,0.08);

padding:10px 18px;

border-radius:20px;

}

</style>

</head>

<body>

<div class="main-card">
{% include 'navbar.html' %}
<div class="avatar">

🤖

</div>

<h1 class="title">

AI Career Coach

</h1>

<p class="subtitle">

Get personalized guidance for placements, coding, resumes and interviews

</p>

<form method="POST">

<textarea

name="question"

class="form-control question-box"

rows="6"

placeholder="Ask anything about placements, coding, interviews, career paths, resume improvement..."

required></textarea>

<button
class="ask-btn">

🚀 Ask AI Career Coach

</button>

</form>

<div class="feature-row">

<div class="feature">
📄 Resume Guidance
</div>

<div class="feature">
💻 Coding Help
</div>

<div class="feature">
🎤 Interview Prep
</div>

<div class="feature">
🏢 Company Insights
</div>

</div>

{% if reply %}

<div class="response-card">

<div class="response-header">

<div class="ai-icon">
🤖
</div>

<div class="response-title">

AI Response

</div>

</div>

<div class="response-content">

<pre>{{ reply }}</pre>

</div>

</div>

{% endif %}

</div>

<script>

if(
'serviceWorker'
in navigator
){

navigator.serviceWorker.register(
'/static/sw.js'
);

}

</script>

</body>

</html>
