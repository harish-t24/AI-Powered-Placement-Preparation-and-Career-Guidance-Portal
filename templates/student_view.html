<!DOCTYPE html>
<html>
<head>
<title>Student Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="card shadow">

<div class="card-body">

<h2>{{ student.name }}</h2>

<hr>

<p><b>Email:</b> {{ student.email }}</p>

<p><b>Aptitude:</b> {{ student.aptitude_score }}</p>

<p><b>Coding:</b> {{ student.coding_score }}</p>

<p><b>Interview:</b> {{ student.interview_score }}</p>

<p><b>Resume:</b> {{ student.resume_score }}</p>

<p><b>Streak:</b> {{ student.streak }}</p>

<a href="/admin"
class="btn btn-primary">

Back

</a>

</div>

</div>

</div>

</body>
</html>
