<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Test Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="manifest"
href="/static/manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="{{ url_for('static', filename='css/responsive.css') }}">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
-45deg,
#0f172a,
#1e293b,
#2563eb,
#06b6d4
);

background-size:
400% 400%;

animation:
gradientMove 12s ease infinite;

overflow:hidden;

}

@keyframes gradientMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.result-card{

width:100%;
max-width:650px;

background:
rgba(255,255,255,0.08);

backdrop-filter:
blur(20px);

border:
1px solid rgba(255,255,255,0.15);

border-radius:30px;

padding:40px;

text-align:center;

color:white;

box-shadow:
0 15px 40px rgba(0,0,0,0.3);

animation:
slideUp 1s ease;

}

@keyframes slideUp{

from{

opacity:0;

transform:
translateY(50px);

}

to{

opacity:1;

transform:
translateY(0);

}

}

.success-icon{

font-size:90px;

animation:
bounce 2s infinite;

}

@keyframes bounce{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-12px);
}

}

.result-title{

font-size:3rem;

font-weight:700;

margin-top:15px;

}

.result-subtitle{

color:#cbd5e1;

margin-bottom:25px;

}

.score-circle{

width:220px;
height:220px;

margin:auto;

border-radius:50%;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background:
conic-gradient(
#22c55e 0deg,
#22c55e calc(({{ score }}/{{ total }}) * 360deg),
rgba(255,255,255,0.15) 0deg
);

box-shadow:
0 0 35px rgba(34,197,94,0.4);

animation:
pulse 2s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.05);
}

100%{
transform:scale(1);
}

}

.score-value{

font-size:3rem;

font-weight:700;

}

.score-label{

font-size:1rem;

color:#dbeafe;

}

.performance-box{

margin-top:30px;

padding:20px;

border-radius:20px;

background:
rgba(255,255,255,0.08);

}

.performance-box h4{

margin-bottom:10px;

}

.dashboard-btn{

margin-top:25px;

padding:15px 35px;

border:none;

border-radius:50px;

font-size:18px;

font-weight:600;

color:white;

background:
linear-gradient(
135deg,
#06b6d4,
#3b82f6
);

transition:0.4s;

}

.dashboard-btn:hover{

transform:
translateY(-5px);

box-shadow:
0 10px 25px rgba(59,130,246,0.5);

color:white;

}

.stars{

font-size:35px;

margin-top:15px;

animation:
glow 1.5s infinite alternate;

}

@keyframes glow{

from{

text-shadow:
0 0 10px gold;

}

to{

text-shadow:
0 0 25px gold;

}

}

</style>

</head>

<body>

<div class="result-card">
{% include 'navbar.html' %}
<div class="success-icon">

🎉

</div>

<h1 class="result-title">

Test Completed

</h1>

<p class="result-subtitle">

Your AI assessment has been evaluated successfully

</p>

<div class="score-circle">

<div class="score-value">

{{ score }}

</div>

<div class="score-label">

out of {{ total }}

</div>

</div>

<div class="stars">

⭐ ⭐ ⭐

</div>

<div class="performance-box">

<h4>

🏆 Performance Summary

</h4>

<p>

You scored

<strong>

{{ score }}

</strong>

out of

<strong>

{{ total }}

</strong>

questions.

Keep practicing to improve your placement readiness.

</p>

</div>

<a href="/dashboard"
class="btn dashboard-btn">

🏠 Back to Dashboard

</a>

</div>

<script>

if(
'serviceWorker'
in navigator
){

navigator.serviceWorker
.register(
'/static/sw.js'
);

}

</script>

</body>

</html>
