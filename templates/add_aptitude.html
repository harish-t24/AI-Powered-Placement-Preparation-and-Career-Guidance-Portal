<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Add Aptitude Question</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="manifest"
href="/static/manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    background:
    linear-gradient(
    -45deg,
    #0f172a,
    #1e293b,
    #2563eb,
    #06b6d4
    );

    background-size:
    400% 400%;

    animation:
    gradientMove 12s ease infinite;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:30px;

}

@keyframes gradientMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.glass-card{

    width:100%;
    max-width:800px;

    background:
    rgba(255,255,255,0.1);

    backdrop-filter:
    blur(20px);

    border:
    1px solid rgba(255,255,255,0.2);

    border-radius:25px;

    padding:40px;

    box-shadow:
    0 15px 40px rgba(0,0,0,0.3);

    animation:
    fadeIn 1s ease;

}

@keyframes fadeIn{

from{

opacity:0;

transform:
translateY(30px);

}

to{

opacity:1;

transform:
translateY(0);

}

}

.title{

    text-align:center;

    color:white;

    font-size:2.5rem;

    font-weight:700;

    margin-bottom:10px;

}

.subtitle{

    text-align:center;

    color:#dbeafe;

    margin-bottom:30px;

}

.form-control{

    border:none;

    border-radius:15px;

    padding:15px;

    margin-bottom:15px;

    background:
    rgba(255,255,255,0.15);

    color:white;

    transition:0.3s;

}

.form-control::placeholder{

    color:#cbd5e1;

}

.form-control:focus{

    background:
    rgba(255,255,255,0.25);

    box-shadow:
    0 0 20px rgba(59,130,246,0.5);

    color:white;

}

.btn-save{

    width:100%;

    padding:15px;

    border:none;

    border-radius:15px;

    font-size:18px;

    font-weight:600;

    color:white;

    background:
    linear-gradient(
    135deg,
    #10b981,
    #06b6d4
    );

    transition:0.4s;

}

.btn-save:hover{

    transform:
    translateY(-4px);

    box-shadow:
    0 10px 25px rgba(16,185,129,0.5);

}

.top-icon{

    text-align:center;

    font-size:60px;

    margin-bottom:15px;

    animation:
    bounce 2s infinite;

}

@keyframes bounce{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}

}

.back-btn{

    margin-top:15px;

    width:100%;

    border-radius:15px;

}

</style>

</head>

<body>

<div class="glass-card">
{% include 'navbar.html' %}
<div class="top-icon">
📝
</div>

<h1 class="title">

Add Aptitude Question

</h1>

<p class="subtitle">

Create and manage aptitude questions for students

</p>

<form method="POST">

<input
class="form-control"
name="question"
placeholder="Enter Question">

<input
class="form-control"
name="option1"
placeholder="Option 1">

<input
class="form-control"
name="option2"
placeholder="Option 2">

<input
class="form-control"
name="option3"
placeholder="Option 3">

<input
class="form-control"
name="option4"
placeholder="Option 4">

<input
class="form-control"
name="answer"
placeholder="Correct Answer">

<button
class="btn-save">

💾 Save Question

</button>

</form>

<a href="/admin"
class="btn btn-light back-btn">

⬅ Back to Admin Dashboard

</a>

</div>

<script>

if('serviceWorker' in navigator){

navigator.serviceWorker.register(
'/static/sw.js'
);

}

</script>

</body>

</html>
