<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AI Voice Interview</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="manifest"
href="/static/manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="{{ url_for('static', filename='css/responsive.css') }}">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:
linear-gradient(
-45deg,
#0f172a,
#1e293b,
#2563eb,
#06b6d4
);

background-size:
400% 400%;

animation:
gradientMove 12s ease infinite;

display:flex;
justify-content:center;
align-items:center;

padding:30px;

}

@keyframes gradientMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.main-card{

width:100%;
max-width:950px;

background:
rgba(255,255,255,0.08);

backdrop-filter:
blur(20px);

border:
1px solid rgba(255,255,255,0.15);

border-radius:30px;

padding:35px;

color:white;

box-shadow:
0 15px 40px rgba(0,0,0,0.3);

animation:
slideUp 1s ease;

}

@keyframes slideUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.avatar-section{

text-align:center;

margin-bottom:25px;

}

.avatar{

font-size:120px;

animation:
floatAvatar 3s ease-in-out infinite;

}

@keyframes floatAvatar{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-12px);
}

100%{
transform:translateY(0);
}

}

.title{

font-size:2.8rem;

font-weight:700;

text-align:center;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#cbd5e1;

margin-bottom:25px;

}

.question-card{

background:
rgba(255,255,255,0.08);

padding:25px;

border-radius:20px;

margin-bottom:25px;

border:
1px solid rgba(255,255,255,0.1);

}

.question-card h4{

line-height:1.8;

}

textarea{

background:
rgba(255,255,255,0.08) !important;

border:none !important;

color:white !important;

border-radius:15px !important;

padding:15px !important;

}

textarea:focus{

box-shadow:
0 0 20px rgba(59,130,246,0.5) !important;

}

.mic-container{

display:flex;

justify-content:center;

margin-bottom:20px;

}

.mic{

width:80px;
height:80px;

border-radius:50%;

background:
linear-gradient(
135deg,
#ef4444,
#f97316
);

display:flex;
justify-content:center;
align-items:center;

font-size:35px;

animation:
pulse 2s infinite;

}

@keyframes pulse{

0%{
box-shadow:
0 0 0 0 rgba(239,68,68,0.7);
}

70%{
box-shadow:
0 0 0 25px rgba(239,68,68,0);
}

100%{
box-shadow:
0 0 0 0 rgba(239,68,68,0);
}

}

.button-group{

display:flex;

gap:15px;

flex-wrap:wrap;

justify-content:center;

margin-top:20px;

}

.btn-custom{

padding:14px 25px;

border:none;

border-radius:50px;

font-size:16px;

font-weight:600;

color:white;

transition:0.4s;

}

.record-btn{

background:
linear-gradient(
135deg,
#ef4444,
#f97316
);

}

.speak-btn{

background:
linear-gradient(
135deg,
#f59e0b,
#eab308
);

}

.submit-btn{

background:
linear-gradient(
135deg,
#10b981,
#06b6d4
);

}

.btn-custom:hover{

transform:
translateY(-5px);

color:white;

}

</style>

</head>

<body>

<div class="main-card">
{% include 'navbar.html' %}
<div class="avatar-section">

<div class="avatar">
👨‍💼
</div>

<h1 class="title">

🎤 AI Voice Interview

</h1>

<p class="subtitle">

Practice real interview questions with voice interaction

</p>

</div>

<div class="question-card">

<h4 id="question">

{{ question }}

</h4>

</div>

<div class="mic-container">

<div class="mic">
🎙
</div>

</div>

<form method="POST">

<input
type="hidden"
name="question"
value="{{ question }}">

<textarea
id="answer"
name="answer"
rows="8"
class="form-control"
placeholder="Your answer will appear here..."
required></textarea>

<div class="button-group">

<button
type="button"
class="btn-custom record-btn"
onclick="startListening()">

🎙 Start Recording

</button>

<button
type="button"
class="btn-custom speak-btn"
onclick="speakQuestion()">

🔊 Read Question

</button>

<button
class="btn-custom submit-btn">

🚀 Submit Answer

</button>

</div>

</form>

</div>

<script>

function speakQuestion(){

let text =
document.getElementById(
"question"
).innerText;

let speech =
new SpeechSynthesisUtterance(
text
);

speech.lang =
"en-US";

speech.rate = 1;

window.speechSynthesis.speak(
speech
);

}

function startListening(){

const SpeechRecognition =

window.SpeechRecognition ||

window.webkitSpeechRecognition;

const recognition =

new SpeechRecognition();

recognition.lang =
"en-US";

recognition.start();

recognition.onresult =
function(event){

let transcript =

event.results[0][0]
.transcript;

document.getElementById(
"answer"
).value +=
transcript + " ";

};

}

if(
'serviceWorker'
in navigator
){

navigator.serviceWorker
.register(
'/static/sw.js'
);

}

</script>

</body>

</html>
