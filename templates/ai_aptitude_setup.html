<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Aptitude Generator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="manifest"
href="/static/manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="{{ url_for('static', filename='css/responsive.css') }}">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
-45deg,
#0f172a,
#1e293b,
#2563eb,
#06b6d4
);

background-size:
400% 400%;

animation:
gradientBG 12s ease infinite;

overflow:hidden;

}

@keyframes gradientBG{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.generator-card{

width:100%;
max-width:700px;

background:
rgba(255,255,255,0.08);

backdrop-filter:
blur(20px);

border:
1px solid rgba(255,255,255,0.15);

border-radius:30px;

padding:40px;

box-shadow:
0 15px 40px rgba(0,0,0,0.3);

animation:
slideUp 1s ease;

color:white;

}

@keyframes slideUp{

from{

opacity:0;

transform:
translateY(50px);

}

to{

opacity:1;

transform:
translateY(0);

}

}

.top-icon{

font-size:80px;

text-align:center;

animation:
floatIcon 3s ease-in-out infinite;

}

@keyframes floatIcon{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}

100%{
transform:translateY(0);
}

}

.title{

text-align:center;

font-size:2.5rem;

font-weight:700;

margin-top:10px;

}

.subtitle{

text-align:center;

color:#cbd5e1;

margin-bottom:30px;

}

.form-label{

font-weight:600;

margin-bottom:8px;

}

.form-select{

border:none;

border-radius:15px;

padding:14px;

background:
rgba(255,255,255,0.15);

color:white;

font-size:16px;

}

.form-select:focus{

box-shadow:
0 0 20px rgba(59,130,246,0.5);

background:
rgba(255,255,255,0.2);

color:white;

}

.form-select option{

background:#1e293b;

color:white;

}

.generate-btn{

width:100%;

padding:15px;

border:none;

border-radius:15px;

font-size:18px;

font-weight:600;

margin-top:15px;

background:
linear-gradient(
135deg,
#06b6d4,
#3b82f6
);

color:white;

transition:0.4s;

}

.generate-btn:hover{

transform:
translateY(-5px);

box-shadow:
0 10px 25px rgba(59,130,246,0.5);

}

.features{

margin-top:30px;

display:flex;

justify-content:space-between;

flex-wrap:wrap;

gap:10px;

}

.feature{

background:
rgba(255,255,255,0.08);

padding:12px 15px;

border-radius:15px;

font-size:14px;

}

.pulse{

animation:
pulse 2s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.03);
}

100%{
transform:scale(1);
}

}

</style>

</head>

<body>

<div class="generator-card pulse">
{% include 'navbar.html' %}
<div class="top-icon">

🧠

</div>

<h1 class="title">

AI Aptitude Generator

</h1>

<p class="subtitle">

Generate company-specific aptitude tests powered by AI

</p>

<form method="POST">

<div class="mb-3">

<label class="form-label">

🎯 Difficulty Level

</label>

<select
name="difficulty"
class="form-select">

<option>
Easy
</option>

<option>
Medium
</option>

<option>
Hard
</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">

🏢 Target Company

</label>

<select
name="company"
class="form-select">

<option>TCS</option>
<option>Infosys</option>
<option>Wipro</option>
<option>Accenture</option>
<option>Cognizant</option>
<option>Zoho</option>
<option>Amazon</option>
<option>Google</option>
<option>Microsoft</option>

</select>

</div>

<button
name="generate"
class="generate-btn">

🚀 Generate AI Test

</button>

</form>

<div class="features">

<div class="feature">
⚡ AI Generated
</div>

<div class="feature">
🎯 Company Specific
</div>

<div class="feature">
📊 Placement Ready
</div>

<div class="feature">
🏆 Smart Evaluation
</div>

</div>

</div>

<script>

if(
'serviceWorker'
in navigator
){

navigator.serviceWorker
.register(
'/static/sw.js'
);

}

</script>

</body>

</html>
