<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Student Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="manifest"
href="/static/manifest.json">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;
align-items:center;

background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#2563eb,
#06b6d4
);

background-size:400% 400%;

animation:
gradientBG 12s ease infinite;

overflow:hidden;

}

@keyframes gradientBG{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.register-card{

width:100%;
max-width:1100px;

background:
rgba(255,255,255,0.08);

backdrop-filter:
blur(20px);

border:
1px solid rgba(255,255,255,0.1);

border-radius:30px;

overflow:hidden;

box-shadow:
0 20px 40px rgba(0,0,0,0.3);

animation:
fadeUp 1s ease;

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.left-panel{

background:
linear-gradient(
135deg,
#10b981,
#06b6d4
);

padding:50px;

height:100%;

display:flex;

flex-direction:column;

justify-content:center;

color:white;

}

.robot{

font-size:120px;

text-align:center;

animation:
floatRobot 3s infinite ease-in-out;

}

@keyframes floatRobot{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-12px);
}

100%{
transform:translateY(0);
}

}

.left-panel h1{

font-size:2.8rem;

font-weight:700;

margin-top:20px;

}

.left-panel p{

margin-top:15px;

font-size:18px;

}

.feature{

background:
rgba(255,255,255,0.15);

padding:10px 15px;

border-radius:15px;

margin-top:10px;

display:inline-block;

}

.right-panel{

padding:50px;

background:
rgba(15,23,42,0.8);

color:white;

}

.form-control{

background:
rgba(255,255,255,0.08);

border:none;

color:white;

padding:14px;

border-radius:15px;

}

.form-control::placeholder{

color:#cbd5e1;

}

.form-control:focus{

background:
rgba(255,255,255,0.12);

color:white;

box-shadow:
0 0 20px rgba(16,185,129,0.3);

}

.register-btn{

width:100%;

padding:14px;

border:none;

border-radius:15px;

font-weight:600;

background:
linear-gradient(
135deg,
#10b981,
#06b6d4
);

color:white;

transition:0.3s;

}

.register-btn:hover{

transform:
translateY(-3px);

}

.login-link{

color:#38bdf8;

text-decoration:none;

font-weight:600;

}

.login-link:hover{

color:white;

}

#installBtn{

display:none;

position:fixed;

bottom:25px;

right:25px;

padding:12px 20px;

border:none;

border-radius:50px;

background:
linear-gradient(
135deg,
#f59e0b,
#ef4444
);

color:white;

font-weight:600;

z-index:999;

}

</style>

</head>

<body>

<div class="container">

<div class="register-card">

<div class="row g-0">

<div class="col-lg-6">

<div class="left-panel">

<div class="robot">

🎓

</div>

<h1>

Join AI Placement Portal

</h1>

<p>

Start your placement journey with AI-powered learning,
coding practice, interviews and resume analysis.

</p>

<div class="feature">

🧠 AI Aptitude Tests

</div>

<div class="feature">

💻 Coding Practice

</div>

<div class="feature">

🎤 Mock Interviews

</div>

<div class="feature">

📄 Resume Analyzer

</div>

<div class="feature">

🏆 Leaderboards

</div>

</div>

</div>

<div class="col-lg-6">

<div class="right-panel">

<h2 class="text-center mb-4">

✨ Student Registration

</h2>

<form method="POST">

<div class="mb-3">

<input
type="text"
name="name"
class="form-control"
placeholder="Full Name"
required>

</div>

<div class="mb-3">

<input
type="email"
name="email"
class="form-control"
placeholder="Email Address"
required>

</div>

<div class="mb-3">

<input
type="password"
name="password"
class="form-control"
placeholder="Create Password"
required>

</div>

<button
class="register-btn">

Create Account

</button>

</form>

<div class="text-center mt-4">

<p>

Already have an account?

</p>

<a href="/login"
class="login-link">

Login Here →

</a>

</div>

</div>

</div>

</div>

</div>

</div>

<button
id="installBtn"
onclick="installApp()">

📱 Install App

</button>

<script>

if('serviceWorker' in navigator){

navigator.serviceWorker.register(
'/static/sw.js'
);

}

</script>

<script>

let deferredPrompt;

window.addEventListener(

'beforeinstallprompt',

(e)=>{

e.preventDefault();

deferredPrompt=e;

document.getElementById(
'installBtn'
).style.display='block';

}

);

function installApp(){

if(deferredPrompt){

deferredPrompt.prompt();

}

}

</script>

</body>

</html>
