<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Technical Interview</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="manifest"
href="/static/manifest.json">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#2563eb,
#06b6d4
);

background-size:400% 400%;

animation:
gradientBG 12s ease infinite;

color:white;

padding:30px;

}

@keyframes gradientBG{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.interview-card{

max-width:1000px;

margin:auto;

background:
rgba(255,255,255,0.08);

backdrop-filter:
blur(20px);

border:
1px solid rgba(255,255,255,0.1);

border-radius:30px;

padding:40px;

box-shadow:
0 20px 40px rgba(0,0,0,0.3);

animation:
fadeUp 1s ease;

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.robot{

font-size:90px;

text-align:center;

margin-bottom:20px;

animation:
floatRobot 3s infinite ease-in-out;

}

@keyframes floatRobot{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}

100%{
transform:translateY(0);
}

}

.title{

font-size:3rem;

font-weight:700;

text-align:center;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#cbd5e1;

margin-bottom:25px;

}

.subject-badge{

display:inline-block;

background:
linear-gradient(
135deg,
#f59e0b,
#ef4444
);

padding:10px 20px;

border-radius:30px;

font-weight:600;

margin-bottom:20px;

}

.question-box{

background:
rgba(255,255,255,0.08);

padding:25px;

border-radius:20px;

margin-bottom:25px;

border-left:
5px solid #38bdf8;

}

.question-box h4{

margin-bottom:0;

}

.form-control{

background:
rgba(255,255,255,0.08);

border:none;

border-radius:20px;

color:white;

padding:20px;

}

.form-control:focus{

background:
rgba(255,255,255,0.12);

color:white;

box-shadow:
0 0 20px rgba(56,189,248,0.4);

}

.form-control::placeholder{

color:#cbd5e1;

}

.action-btn{

padding:14px 28px;

border:none;

border-radius:50px;

font-weight:600;

margin:5px;

transition:0.3s;

}

.submit-btn{

background:
linear-gradient(
135deg,
#10b981,
#06b6d4
);

color:white;

}

.voice-btn{

background:
linear-gradient(
135deg,
#2563eb,
#3b82f6
);

color:white;

}

.action-btn:hover{

transform:
translateY(-4px);

}

.status-box{

display:flex;

justify-content:center;

gap:15px;

flex-wrap:wrap;

margin-bottom:25px;

}

.status{

background:
rgba(255,255,255,0.08);

padding:10px 18px;

border-radius:20px;

}

</style>

</head>

<body>

<div class="interview-card">

<div class="robot">

💻

</div>

<h1 class="title">

Technical Interview

</h1>

<p class="subtitle">

Answer technical questions and improve your interview skills

</p>

<div class="text-center">

<div class="subject-badge">

📚 {{ subject }}

</div>

</div>

<div class="status-box">

<div class="status">

🤖 AI Evaluated

</div>

<div class="status">

🎯 Technical Round

</div>

<div class="status">

🚀 Placement Ready

</div>

</div>

<div class="question-box">

<h4 id="questionText">

{{ question }}

</h4>

</div>

<form method="POST">

<input
type="hidden"
name="submit_answer"
value="1">

<textarea
name="answer"
class="form-control"
rows="8"
placeholder="Write your detailed answer here..."
required></textarea>

<div class="text-center mt-4">

<button
type="button"
class="action-btn voice-btn"
onclick="readQuestion()">

🔊 Read Question

</button>

<button
type="submit"
class="action-btn submit-btn">

🚀 Submit Answer

</button>

</div>

</form>

<div class="text-center mt-4">

<a href="javascript:history.back()"
class="btn btn-secondary action-btn">

⬅ Back

</a>

<a href="/dashboard"
class="btn btn-success action-btn">

🏠 Dashboard

</a>

</div>

</div>

<script>

function readQuestion(){

let text =
document.getElementById(
"questionText"
).innerText;

let speech =
new SpeechSynthesisUtterance(text);

speech.lang =
"en-US";

window.speechSynthesis.speak(speech);

}

</script>

<script>

if(
'serviceWorker'
in navigator
){

navigator.serviceWorker.register(
'/static/sw.js'
);

}

</script>

</body>

</html>
