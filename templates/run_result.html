<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Code Execution Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="manifest"
href="/static/manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:
linear-gradient(
-45deg,
#0f172a,
#1e293b,
#2563eb,
#06b6d4
);

background-size:
400% 400%;

animation:
gradientBG 12s ease infinite;

padding:40px;

color:white;

}

@keyframes gradientBG{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.result-card{

max-width:1200px;

margin:auto;

background:
rgba(255,255,255,0.08);

backdrop-filter:
blur(20px);

border:
1px solid rgba(255,255,255,0.15);

border-radius:30px;

padding:40px;

animation:
fadeUp 1s ease;

box-shadow:
0 20px 40px rgba(0,0,0,0.3);

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.header{

text-align:center;

margin-bottom:30px;

}

.result-icon{

font-size:100px;

animation:
floatIcon 3s infinite ease-in-out;

}

@keyframes floatIcon{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-12px);
}

100%{
transform:translateY(0);
}

}

.header h1{

font-size:3rem;

font-weight:700;

margin-top:10px;

}

.header p{

color:#cbd5e1;

}

.section-box{

background:
rgba(255,255,255,0.06);

border-radius:20px;

padding:20px;

margin-top:20px;

}

.section-title{

font-size:1.3rem;

font-weight:600;

margin-bottom:15px;

color:#38bdf8;

}

.code-block{

background:#0d1117;

color:#22c55e;

padding:20px;

border-radius:15px;

font-family:
Consolas,
monospace;

overflow-x:auto;

white-space:pre-wrap;

}

.output-block{

background:#111827;

color:#f8fafc;

padding:20px;

border-radius:15px;

font-family:
Consolas,
monospace;

overflow-x:auto;

white-space:pre-wrap;

}

.action-row{

display:flex;

justify-content:center;

gap:15px;

margin-top:30px;

flex-wrap:wrap;

}

.btn-custom{

padding:12px 25px;

border:none;

border-radius:50px;

font-weight:600;

text-decoration:none;

color:white;

transition:0.3s;

}

.btn-custom:hover{

transform:
translateY(-3px);

color:white;

}

.btn-back{

background:
linear-gradient(
135deg,
#2563eb,
#3b82f6
);

}

.btn-dashboard{

background:
linear-gradient(
135deg,
#10b981,
#06b6d4
);

}

.btn-practice{

background:
linear-gradient(
135deg,
#f59e0b,
#ef4444
);

}

</style>

</head>

<body>

<div class="result-card">

<div class="header">

<div class="result-icon">

🚀

</div>

<h1>

Code Execution Result

</h1>

<p>

Review your submitted code and output

</p>

</div>

<div class="section-box">

<div class="section-title">

💻 Submitted Code

</div>

<div class="code-block">

{{ code }}

</div>

</div>

<div class="section-box">

<div class="section-title">

📤 Program Output

</div>

<div class="output-block">

{{ output }}

</div>

</div>

<div class="action-row">

<a href="/coding"
class="btn-custom btn-practice">

🔄 Try Another Question

</a>

<a href="/dashboard"
class="btn-custom btn-dashboard">

🏠 Dashboard

</a>

<a href="javascript:history.back()"
class="btn-custom btn-back">

⬅ Back

</a>

</div>

</div>

<script>

if(
'serviceWorker'
in navigator
){

navigator.serviceWorker.register(
'/static/sw.js'
);

}

</script>

</body>

</html>
